{% extends 'base.html' %}
{% block content %}

<div class="table-container">
    <table class="table is-fullwidth is-striped is-hoverable">
        <thead>
            <tr>
                <th>Code</th>
                <th>Title</th>
                <th>Semester</th>
                <th>Instructor</th>
                <th>actions</th>
            </tr>
        </thead>
        <tbody>
            {% for course in courses %}
            <tr>
                <td>{{ course.course_code }}</td>
                <td>{{ course.title }}</td>
                <td>{{ course.semester }}</td>
                <td>{{ course.instructor }}</td>
                <td>
                    <a class="button is-small is-info" href="{% url 'edit_course' course.id %}">Edit</a>
                    <a class="button is-small is-danger" href="{% url 'delete_course' course.id %}">Delete</a>
                </td>
            </tr>
            {% empty %}
            <tr>
                <td colspan="5">No courses found.</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
  <a class="button is-primary" href="{% url 'add_course' %}">Add Course</a>


{% endblock content %}
