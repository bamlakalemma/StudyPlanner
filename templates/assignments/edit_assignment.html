{%extends 'base.html' %}
{%block content %}
    <h2>Edit Assignment</h2>
    <form method="post" action="{% url 'edit_assignment' assignment.id %}">
        {% csrf_token %}
         {{ form.as_p }}
        <button class="button is-primary" type="submit">Save Changes</button>
        <a class="button is-link" href="{% url 'assignments' %}">Cancel</a>
    </form>
{%endblock content %}
