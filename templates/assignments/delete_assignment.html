{%extends 'base.html' %}
{% block content %}
    <h2>Delete Assignment</h2>
    <p>Are you sure you want to delete the assignment "{{ assignment.title }}"?</p>
    <form method="post" action="{% url 'delete_assignment' assignment.id %}">
        {% csrf_token %}
        <button class="button is-danger" type="submit">Delete</button>
        <a class="button is-link" href="{% url 'assignments' %}">Cancel</a>
    </form>
{% endblock content %}
