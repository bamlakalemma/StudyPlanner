{%extends 'base.html' %}

{% block content %}
<h2>Edit course</h2>
<form method="post" action="{% url 'edit_course' course.id %}">
    {% csrf_token %}
    {{ form.as_p }}
    <button class="button is-primary" type="submit">Save Changes</button>
    <a class="button is-link" href="{% url 'courses' %}">Cancel</a>
</form>
{% endblock content %}
