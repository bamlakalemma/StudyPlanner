{%extends 'base.html' %}  
{% block content %}
<h2>Delete Task</h2>
<p>Are you sure you want to delete this task?</p>
<form method="post" action="{% url 'delete_task' task.id %}">
    {% csrf_token %}
    <button class="button is-danger" type="submit">Yes, delete</button>
    <a class="button is-link" href="{% url 'planner' %}">Cancel</a>
</form>
{% endblock content %}
