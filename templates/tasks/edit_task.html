{%extends 'base.html' %}  
{% block content %}
<h2>Edit Task</h2>
<form method="post" action="{% url 'edit_task' task.id %}">
    {% csrf_token %}
    {{ form.as_p }}
    <button class="button is-primary" type="submit">Save Changes</button>
    <a class="button is-link" href="{% url 'planner' %}">Cancel</a>
</form>
{% endblock content %}
